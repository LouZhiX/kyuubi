# Kyuubi Knox Integration Example Configuration
# This file demonstrates how to configure Kyuubi for Knox integration

# ============================================================================
# Knox Integration Configuration
# ============================================================================

# Enable Knox integration
kyuubi.knox.integration.enabled=true

# Knox Gateway URL (update this with your actual Knox Gateway URL)
kyuubi.knox.gateway.url=https://localhost:8443

# Knox topology name (should match the topology file name in Knox)
kyuubi.knox.topology.name=kyuubi

# Knox service path
kyuubi.knox.service.path=/kyuubi

# Enable SSL for Knox integration
kyuubi.knox.ssl.enabled=true

# Enable authentication for Knox integration
kyuubi.knox.authentication.enabled=true

# Knox proxy users (users allowed to proxy through Knox)
kyuubi.knox.proxy.users=knox,admin

# ============================================================================
# Frontend Configuration
# ============================================================================

# Enable REST protocol (required for Knox integration)
kyuubi.frontend.protocols=REST

# REST service configuration
kyuubi.frontend.rest.bind.port=10099
kyuubi.frontend.bind.host=0.0.0.0

# Enable CORS for Knox integration
kyuubi.frontend.rest.cors.enabled=true
kyuubi.frontend.rest.cors.allowed.origins=*
kyuubi.frontend.rest.cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
kyuubi.frontend.rest.cors.allowed.headers=*

# ============================================================================
# Authentication Configuration
# ============================================================================

# Authentication method (can be NONE, KERBEROS, LDAP, etc.)
kyuubi.authentication=NONE

# If using Kerberos authentication
# kyuubi.authentication=KERBEROS
# kyuubi.authentication.kerberos.principal=kyuubi/_HOST@REALM
# kyuubi.authentication.kerberos.keytab=/path/to/kyuubi.keytab

# ============================================================================
# Engine Configuration
# ============================================================================

# Engine type
kyuubi.engine.type=SPARK_SQL

# Engine share level
kyuubi.engine.share.level=USER

# Session engine initialization timeout
kyuubi.session.engine.initialize.timeout=PT3M

# ============================================================================
# High Availability Configuration
# ============================================================================

# HA addresses (if using ZooKeeper)
# kyuubi.ha.addresses=zk1:2181,zk2:2181,zk3:2181
# kyuubi.ha.namespace=kyuubi

# ============================================================================
# Logging Configuration
# ============================================================================

# Log level for Knox integration
kyuubi.logging.level=INFO

# ============================================================================
# Performance Configuration
# ============================================================================

# Maximum worker threads for REST service
kyuubi.frontend.rest.max.worker.threads=200

# Jetty stop timeout
kyuubi.frontend.rest.jetty.stop.timeout=PT30S

# ============================================================================
# Security Configuration
# ============================================================================

# Server administrators
kyuubi.server.administrators=admin

# ============================================================================
# Monitoring Configuration
# ============================================================================

# Enable metrics
kyuubi.metrics.enabled=true

# Metrics reporters
kyuubi.metrics.reporters=JSON

# ============================================================================
# Example Usage
# ============================================================================

# To use this configuration:
# 1. Copy this file to conf/kyuubi-knox.conf
# 2. Update the configuration values according to your environment
# 3. Start Kyuubi with: bin/kyuubi start --conf conf/kyuubi-knox.conf
#
# Access URLs:
# - Direct access: http://kyuubi-host:10099/ui/
# - Through Knox: https://knox-host:8443/gateway/kyuubi/kyuubi/