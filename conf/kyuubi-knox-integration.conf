## Kyuubi Knox Integration Configuration Example
## 
## This file demonstrates how to configure Kyuubi 1.9 to work with Apache Knox
## for WebUI proxy integration. Copy the relevant sections to your
## kyuubi-defaults.conf file and adjust the values according to your environment.

#
# Basic Kyuubi Configuration
#
kyuubi.authentication                    NONE
kyuubi.frontend.bind.host                0.0.0.0
kyuubi.frontend.protocols                THRIFT_BINARY,REST
kyuubi.frontend.thrift.binary.bind.port  10009
kyuubi.frontend.rest.bind.port           10099

#
# Knox Integration Configuration
#

# Enable Knox proxy for Kyuubi WebUI
# Set to true to enable Knox integration
kyuubi.frontend.knox.proxy.enabled      true

# Knox gateway URL
# This should be the base URL of your Knox gateway including protocol, host and port
# Example: https://knox-gateway.example.com:8443
kyuubi.frontend.knox.gateway.url        https://knox-server.example.com:8443

# Knox service name
# This should match the service name defined in Knox service definition (service.xml)
# Default: KYUUBI
kyuubi.frontend.knox.service.name        KYUUBI

# Knox topology name
# This should match the topology name defined in Knox configuration
# Default: kyuubi
kyuubi.frontend.knox.topology.name       kyuubi

# Knox context path
# This is the path prefix used by Knox to route requests to Kyuubi WebUI
# Default: /kyuubi
kyuubi.frontend.knox.context.path        /kyuubi

# Enable Knox authentication integration
# When enabled, Kyuubi will trust Knox authentication headers
# Default: true
kyuubi.frontend.knox.authentication.enabled  true

# Knox principal header
# HTTP header name used by Knox to pass the authenticated user principal
# Common values: SM_USER, X-Forwarded-User, Remote-User
# Default: SM_USER
kyuubi.frontend.knox.principal.header    SM_USER

# Knox groups header  
# HTTP header name used by Knox to pass the user groups
# Common values: SM_GROUPS, X-Forwarded-Groups, Remote-Groups
# Default: SM_GROUPS
kyuubi.frontend.knox.groups.header       SM_GROUPS

#
# REST Frontend Configuration (Required for Knox Integration)
#

# Maximum number of worker threads for REST frontend
kyuubi.frontend.rest.max.worker.threads  200

# Minimum number of worker threads for REST frontend  
kyuubi.frontend.rest.min.worker.threads  10

# Jetty stop timeout for REST frontend
kyuubi.frontend.rest.jetty.stopTimeout   30000

#
# Engine Configuration
#
kyuubi.engine.type                       SPARK_SQL
kyuubi.engine.share.level                USER
kyuubi.session.engine.initialize.timeout PT3M

#
# High Availability Configuration (Optional)
#
# If using ZooKeeper for HA, configure the following:
# kyuubi.ha.addresses                      zk1:2181,zk2:2181,zk3:2181
# kyuubi.ha.namespace                      kyuubi

#
# Security Configuration (Optional)
#

# If using Kerberos authentication
# kyuubi.authentication                    KERBEROS
# kyuubi.kinit.principal                   kyuubi/kyuubi-server.example.com@EXAMPLE.COM
# kyuubi.kinit.keytab                      /etc/security/keytabs/kyuubi.service.keytab

# If using custom authentication
# kyuubi.authentication.custom.class       org.apache.kyuubi.server.http.authentication.KnoxAuthenticationHandler

#
# Logging Configuration (Optional)
#

# Enable debug logging for Knox integration (for troubleshooting)
# Add the following to your log4j2.xml:
# <Logger name="org.apache.kyuubi.server.ui" level="DEBUG"/>
# <Logger name="org.apache.kyuubi.server.http.authentication" level="DEBUG"/>

#
# Example Production Configuration
#

## For a production environment with multiple Kyuubi servers behind Knox:
# kyuubi.frontend.knox.proxy.enabled      true
# kyuubi.frontend.knox.gateway.url        https://knox-prod.company.com:8443
# kyuubi.frontend.knox.service.name        KYUUBI
# kyuubi.frontend.knox.topology.name       production
# kyuubi.frontend.knox.context.path        /kyuubi
# kyuubi.frontend.knox.authentication.enabled  true
# kyuubi.frontend.knox.principal.header    SM_USER
# kyuubi.frontend.knox.groups.header       SM_GROUPS
# kyuubi.frontend.rest.bind.host           0.0.0.0
# kyuubi.frontend.rest.bind.port           10099
# kyuubi.frontend.rest.max.worker.threads  500
# kyuubi.ha.addresses                      zk1:2181,zk2:2181,zk3:2181
# kyuubi.ha.namespace                      kyuubi-prod
# kyuubi.authentication                    KERBEROS
# kyuubi.kinit.principal                   kyuubi/kyuubi-server.company.com@COMPANY.COM
# kyuubi.kinit.keytab                      /etc/security/keytabs/kyuubi.service.keytab

#
# Example Development Configuration
#

## For a development environment with simple setup:
# kyuubi.frontend.knox.proxy.enabled      true  
# kyuubi.frontend.knox.gateway.url        http://knox-dev.company.com:8080
# kyuubi.frontend.knox.service.name        KYUUBI
# kyuubi.frontend.knox.topology.name       development
# kyuubi.frontend.knox.context.path        /kyuubi
# kyuubi.frontend.knox.authentication.enabled  false
# kyuubi.frontend.rest.bind.host           0.0.0.0
# kyuubi.frontend.rest.bind.port           10099
# kyuubi.authentication                    NONE

# Details in https://kyuubi.readthedocs.io/en/master/configuration/settings.html